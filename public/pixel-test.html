<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Pixel Test - ASD Meraki Experience</title>
<!-- Meta Pixel Code -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',

fbq('consent', 'grant');

<noscript><img height="1" width="1" style="display:none"

/></noscript>
<!-- End Meta Pixel Code -->
<style>
body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f7; }
.card { background: white; padding: 48px; border-radius: 20px; text-align: center; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
h1 { font-size: 24px; margin: 0 0 16px; }
#status { font-size: 16px; margin: 16px 0; padding: 16px; border-radius: 12px; }
.ok { background: #d4edda; color: #155724; }
.fail { background: #f8d7da; color: #721c24; }
.loading { background: #fff3cd; color: #856404; }
</style>
</head>
<body>
<div class="card">
  <h1>🔍 Meta Pixel Test v2</h1>
  <p>Questa pagina verifica se il pixel sta funzionando (con consent grant).</p>
  <div id="status" class="loading">Caricamento in corso...</div>
  <div id="details"></div>
</div>
<script>
setTimeout(function() {
  var statusEl = document.getElementById('status');
  var detailsEl = document.getElementById('details');
  var results = [];

  if (typeof window.fbq === 'function') {
    results.push('✅ fbq() esiste');
  } else {
    results.push('❌ fbq() NON trovato');
  }

  var fbResources = performance.getEntriesByType('resource').filter(function(r) {
    return r.name.includes('fbevents');
  });
  if (fbResources.length > 0 && fbResources[0].transferSize > 0) {
    results.push('✅ fbevents.js caricato (' + Math.round(fbResources[0].transferSize/1024) + 'KB)');
  } else if (fbResources.length > 0) {
    results.push('⚠️ fbevents.js richiesto ma possibile blocco (size: ' + fbResources[0].transferSize + ')');
  } else {
    results.push('❌ fbevents.js NON caricato');
  }

  var trResources = performance.getEntriesByType('resource').filter(function(r) {
    return r.name.includes('facebook.com/tr');
  });
  if (trResources.length > 0) {
    results.push('✅ Richiesta di tracciamento inviata a Facebook (' + trResources.length + ' richieste)');
  } else {
    results.push('❌ Nessuna richiesta inviata a facebook.com/tr');
  }

  if (window.fbq && window.fbq.queue) {
    results.push('📋 Coda fbq: ' + window.fbq.queue.length + ' eventi in attesa');
  } else {
    results.push('✅ Coda fbq processata (nessun evento in attesa)');
  }

  if (window.fbq && window.fbq.loaded) {
    results.push('✅ fbq.loaded = true');
  }

  var allOk = results.filter(function(r) { return r.startsWith('❌'); }).length === 0;
  statusEl.className = allOk ? 'ok' : 'fail';
  statusEl.innerHTML = allOk ? '✅ PIXEL FUNZIONANTE!' : '⚠️ Problemi rilevati';
  detailsEl.innerHTML = '<ul style="text-align:left;list-style:none;padding:0;margin-top:16px;">' + 
    results.map(function(r) { return '<li style="padding:4px 0;">' + r + '</li>'; }).join('') + 
    '</ul>';
}, 5000);
</script>
</body>
</html>
